; PlatformIO Project Configuration File
; Edge-AI IoT Framework - ESP32 Firmware
; Phase 1: Current/Voltage Sampling + MQTT Publishing

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0
    esphome/AsyncTCP-esphome@^2.1
    esphome/ESPAsyncWebServer-esphome@^3.2

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
